      // 发布下拉菜单项
      'Publish now':             '\u73B0\u5728\u53D1\u5E03',
      'Publish and create new':  '\u53D1\u5E03\u5E76\u521B\u5EFA\u65B0\u7BC7',
      'Publish and duplicate':    '\u53D1\u5E03\u5E76\u590D\u5236',

      // 日期选择器
      'Now':                     '\u4ECA\u5929',

      // 校验消息
      'is required':             '\u662F\u5FC5\u586B\u9879\u54C9',

      // 弹窗提示
      'A local backup was recovered for this entry, would you like to use it?':
                                  '\u68C0\u6D4B\u5230\u8FD9\u6761\u5185\u5BB9\u7684\u672C\u5730\u5907\u4EFD\uFF0C\u662F\u5426\u6062\u590D\u5907\u4EFD\u5185\u5BB9\uFF1F',
    };

    // ========== 第二部分：DOM 树安全遍历翻译 ==========
    function translateLeafNodes() {
      try {
        var nodes = document.querySelectorAll(
          'span,button,label,h1,h2,h3,h4,p,div,li,a,th,td,legend,option,strong,em'
        );
        for (var i = 0; i < nodes.length; i++) {
          var el = nodes[i];
          if (el.childNodes.length !== 1) continue;
          var cn = el.childNodes[0];
          if (cn.nodeType !== 3) continue;
          var t = cn.textContent.trim();
          if (EXACT[t] !== undefined && EXACT[t] !== '') {
            cn.textContent = EXACT[t];
          }
        }
      } catch(e) {}
    }

    // ========== 第三部分：正则替换动态拼接文本 ==========
    function replacePatterns() {
      try {
        var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        var nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);

        for (var j = 0; j < nodes.length; j++) {
          var n = nodes[j];
          if (!n.textContent || !n.parentElement) continue;
          // 跳过 textarea/input 等可编辑区域
          var tag = n.parentElement.tagName;
          if (tag === 'TEXTAREA' || tag === 'INPUT' || tag === 'SCRIPT' || tag === 'STYLE') continue;

          var txt = n.nodeValue;
          var changed = false;

          // "xxx is required" → "xxx 是必填项哦"
          if (/ is required$/.test(txt)) {
            n.nodeValue = txt.replace(/ is required$/, ' \u662F\u5FC5\u586B\u9879\u54C9');
            changed = true;
          }

          // "Writing in xxx collection" → "正在编辑 xxx"（多种格式兼容）
          if (/Writing in/.test(txt) && /collection/.test(txt)) {
            n.nodeValue = txt.replace(/Writing in\s+/, '\u6B63\u5728\u7F16\u8F91 ').replace(/\s*collection\s*/, '');
            changed = true;
          }
          // 单独残留的 "collection"
          if (txt.trim() === 'collection') {
            n.nodeValue = '';
            changed = true;
          }

          // "Publish now" 等可能在更深层节点
          if (txt.trim() === 'Publish now') { n.nodeValue = '\u73B0\u5728\u53D1\u5E03'; changed = true; }
          if (txt.trim() === 'Publish and create new') { n.nodeValue = '\u53D1\u5E03\u5E76\u521B\u5EFA\u65B0\u7BC7'; changed = true; }
          if (txt.trim() === 'Publish and duplicate') { n.nodeValue = '\u53D1\u5E03\u5E76\u590D\u5236'; changed = true; }
          if (txt.trim() === 'Now' && tag !== 'OPTION') { n.nodeValue = '\u4ECA\u5929'; changed = true; }
          if (txt.trim() === 'Clear') { n.nodeValue = '\u6E05\u7A7A'; changed = true; }

          // "Add" 在按钮里（标签添加等）
          if (txt.trim() === 'Add' && (tag === 'BUTTON' || tag === 'SPAN')) {
            // 只替换独立的 "Add"，不替换 "Add another" 等
            n.nodeValue = '\u6DFB\u52A0';
            changed = true;
          }
        }
      } catch(e) {}
    }

    // 统一调度
    function doTranslate() {
      translateLeafNodes();
      replacePatterns();
    }

    function schedule() {
      if (window.requestIdleCallback) {
        window.requestIdleCallback(doTranslate, { timeout: 2000 });
      } else {
        setTimeout(doTranslate, 100);
      }
    }

    // 启动
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', schedule);
    } else {
      schedule();
    }
    window.addEventListener('load', function() { setTimeout(schedule, 1000); });
    setInterval(schedule, 4000);

    var obs = new MutationObserver(function() { schedule(); });
    obs.observe(document.documentElement, { childList: true, subtree: true });
  })();
  </script>
