backend:
  name: git-gateway
  branch: main
media_folder: "images"
public_folder: "images"
locale: zh
publish_mode: simple

collections:
  - name: "site"
    label: "站点设置"
    files:
      - name: "config"
        label: "站点配置（网站名、菜单、自媒体、相册等都在这里改）"
        file: "config.json"
        fields:
          - { name: siteName,  label: "网站名称", widget: string , required: false }
          - { name: logoText, label: "左上角图标（可以写一个字或放个emoji）", widget: string , required: false }
          - { name: authorName,label: "作者名字", widget: string , required: false }
          - { name: tagline,  label: "首页一句话介绍", widget: string , required: false }
          - name: about
            label: "关于我（一段话一段地写，会自动分段显示）"
            widget: list
            field: { name: para, label: "段落内容", widget: text , required: false }
          - name: socials
            label: "联系方式（邮箱、GitHub等）"
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "名称（比如：邮箱）", widget: string , required: false }
              - { name: url,   label: "链接地址", widget: string , required: false }
          - name: media
            label: "自媒体平台（点击可跳转）"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "平台名称（比如：公众号）", widget: string , required: false }
              - { name: icon, label: "图标（放一个emoji）", widget: string , required: false }
              - { name: url,  label: "跳转地址", widget: string , required: false }
              - { name: desc, label: "一句话说明", widget: string , required: false }
          - name: photos
            label: "相册图片"
            widget: list
            summary: "{{fields.caption}}"
            fields:
              - { name: src,     label: "📷 上传图片（点这里选择电脑里的图片文件）", widget: image , required: false }
              - { name: emoji,    label: "占位图标（没放图时显示这个emoji）", widget: string , required: false }
              - { name: caption,  label: "图片说明文字", widget: string , required: false }
          - name: waline
            label: "评论系统（Waline）"
            widget: object
            collapsed: true
            fields:
              - { name: serverURL, label: "评论服务地址（填了才开启评论功能）", widget: string , required: false }
              - { name: pageview,  label: "是否显示阅读量统计", widget: boolean, default: true , required: false }
          - name: resume
            label: "个人简历 / 作品集"
            widget: object
            collapsed: true
            fields:
              - { name: headline, label: "姓名", widget: string , required: false }
              - { name: sub,      label: "副标题（比如职位+状态）", widget: string , required: false }
              - { name: summary,  label: "自我介绍（一段话概括自己）", widget: text , required: false }
              - name: skills
                label: "技能分组"
                widget: list
                fields:
                  - { name: group, label: "分组名称（比如：测试方向）", widget: string , required: false }
                  - name: tags
                    label: "具体技能标签"
                    widget: list
                    field: { name: tag, label: "技能名", widget: string , required: false }
              - name: experience
                label: "工作经历"
                widget: list
                fields:
                  - { name: role,    label: "职位名称", widget: string , required: false }
                  - { name: company, label: "公司名称", widget: string , required: false }
                  - { name: period,  label: "时间段（比如：2021 – 2024）", widget: string , required: false }
                  - { name: desc,    label: "工作描述（做了什么、负责什么）", widget: text , required: false }
              - name: education
                label: "教育背景"
                widget: list
                fields:
                  - { name: school, label: "学校名称", widget: string , required: false }
                  - { name: major,  label: "专业", widget: string , required: false }
                  - { name: period, label: "就读时间", widget: string , required: false }
              - name: certifications
                label: "证书 / 资格"
                widget: list
                field: { name: cert, label: "证书名称", widget: string , required: false }
          - name: links
            label: "友情链接"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name,   label: "友站名称", widget: string , required: false }
              - { name: url,    label: "友站地址", widget: string , required: false }
              - { name: desc,   label: "一句话介绍", widget: string , required: false }
              - { name: avatar, label: "图标（emoji）", widget: string , required: false }
          - name: reward
            label: "赞赏 / 打赏"
            widget: object
            collapsed: true
            fields:
              - { name: wechat, label: "📷 微信收款码（上传图片）", widget: image , required: false }
              - { name: alipay, label: "📷 支付宝收款码（上传图片）", widget: image , required: false }
              - { name: note,   label: "打赏提示语", widget: string , required: false }
          - name: seo
            label: "搜索引擎优化 / 分享卡片设置"
            widget: object
            collapsed: true
            fields:
              - { name: title,       label: "分享标题（别人分享时显示的标题）", widget: string , required: false }
              - { name: description, label: "分享描述（别人分享时显示的简介）", widget: string , required: false }
              - { name: image,       label: "📷 分享封面图（上传图片）", widget: image , required: false }

          # ========== 导航菜单 ==========
          - name: menus
            label: "导航菜单（顶部导航栏和手机侧边栏都会用到）"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title,   label: "菜单名称（比如：首页、技术、关于）", widget: string , required: false }
              - name: type
                label: "点击这个菜单要去哪里？（下拉选择）"
                widget: select
                options:
                  - { label: "→ 首页", value: "home" }
                  - { label: "→ 技术文章列表", value: "tech" }
                  - { label: "→ 生活随笔列表", value: "life" }
                  - { label: "→ 随想感悟列表", value: "mind" }
                  - { label: "→ 相册页面", value: "gallery" }
                  - { label: "→ 留言墙", value: "board" }
                  - { label: "→ 我的简历", value: "resume" }
                  - { label: "→ 友情链接", value: "links" }
                  - { label: "→ 关于我", value: "about" }
                  - { label: "→ 跳转到某篇文章", value: "post" }
                  - { label: "→ 打开一个外部网址", value: "url" }
                  - { label: "→ 发邮件给我", value: "mailto" }
              - { name: target, label: "补充信息（看上面选的是什么再填这里）", widget: string, hint: "选了「跳转到某篇文章」→ 填文章编号（数字）；选了「打开外部网址」→ 填完整网址（https://...）；选了「发邮件」→ 填邮箱地址；其他选项不用填，留空即可。" , required: false }
              # 二级子菜单
              - name: children
                label: "二级子菜单（不需要就留空，不会显示）"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title,   label: "菜单名称", widget: string , required: false }
                  - name: type
                    label: "点击后去哪？"
                    widget: select
                    options:
                      - { label: "→ 首页", value: "home" }
                      - { label: "→ 技术文章列表", value: "tech" }
                      - { label: "→ 生活随笔列表", value: "life" }
                      - { label: "→ 随想感悟列表", value: "mind" }
                      - { label: "→ 相册页面", value: "gallery" }
                      - { label: "→ 留言墙", value: "board" }
                      - { label: "→ 我的简历", value: "resume" }
                      - { label: "→ 友情链接", value: "links" }
                      - { label: "→ 关于我", value: "about" }
                      - { label: "→ 跳转到某篇文章", value: "post" }
                      - { label: "→ 打开外部网址", value: "url" }
                      - { label: "→ 发邮件给我", value: "mailto" }
                  - { name: target, label: "补充信息（同上规则）", widget: string , required: false }
                  - name: children
                    label: "三级子菜单（不需要留空）"
                    widget: list
                    summary: "{{fields.title}}"
                    fields:
                      - { name: title,   label: "菜单名称", widget: string , required: false }
                      - name: type
                        label: "点击后去哪？"
                        widget: select
                        options:
                          - { label: "→ 首页", value: "home" }
                          - { label: "→ 技术文章列表", value: "tech" }
                          - { label: "→ 生活随笔列表", value: "life" }
                          - { label: "→ 随想感悟列表", value: "mind" }
                          - { label: "→ 相册页面", value: "gallery" }
                          - { label: "→ 留言墙", value: "board" }
                          - { label: "→ 我的简历", value: "resume" }
                          - { label: "→ 友情链接", value: "links" }
                          - { label: "→ 关于我", value: "about" }
                          - { label: "→ 跳转到某篇文章", value: "post" }
                          - { label: "→ 打开外部网址", value: "url" }
                          - { label: "→ 发邮件给我", value: "mailto" }
                      - { name: target, label: "补充信息", widget: string , required: false }
                      - name: children
                        label: "四级子菜单（一般用不到，留空即可）"
                        widget: list
                        summary: "{{fields.title}}"
                        fields:
                          - { name: title,   label: "菜单名称", widget: string , required: false }
                          - name: type
                            label: "点击后去哪？"
                            widget: select
                            options:
                              - { label: "→ 首页", value: "home" }
                              - { label: "→ 技术文章列表", value: "tech" }
                              - { label: "→ 生活随笔列表", value: "life" }
                              - { label: "→ 随想感悟列表", value: "mind" }
                              - { label: "→ 相册页面", value: "gallery" }
                              - { label: "→ 留言墙", value: "board" }
                              - { label: "→ 我的简历", value: "resume" }
                              - { label: "→ 友情链接", value: "links" }
                              - { label: "→ 关于我", value: "about" }
                              - { label: "→ 跳转到某篇文章", value: "post" }
                              - { label: "→ 打开外部网址", value: "url" }
                              - { label: "→ 发邮件给我", value: "mailto" }
                          - { name: target, label: "补充信息", widget: string , required: false }

  # ========== 文章管理 ==========
  - name: "posts"
    label: "文章管理"
    label_singular: "文章"
    folder: "posts"
    create: true
    slug: "{{fields.id}}"
    summary: "{{fields.title}}（{{fields.cat}}）"
    description: "操作说明：点右上角「新增文章」发布新内容；点列表中的任意一行编辑；每行末尾 ⋯ 可删除。"
    editor:
      preview: true
    sortable_fields: [date, title, cat]
    view_filters:
      - { label: "📋 全部文章", field: "cat", pattern: ".*" }
      - { label: "💻 技术类", field: "cat", pattern: "tech" }
      - { label: "🌿 生活类", field: "cat", pattern: "life" }
      - { label: "💭 随想类", field: "cat", pattern: "mind" }
    fields:
      - { name: id,       label: "文章编号（数字，不能重复。下一篇就填5、6…）", widget: number, value_type: int , required: false }
      - { name: title,    label: "文章标题", widget: string , required: false }
      - name: cat
        label: "文章分类"
        widget: select
        options:
          - { label: "💻 技术", value: "tech" }
          - { label: "🌿 生活", value: "life" }
          - { label: "💭 随想", value: "mind" }
        default: "tech"
      - { name: date,     label: "发布日期", widget: datetime, format: "YYYY-MM-DD" , required: false }
      - name: tags
        label: "标签（方便读者按关键词查找）"
        widget: list
        summary: "#{{fields.tag}}"
        field: { name: tag, label: "标签词", widget: string , required: false }
      - { name: excerpt,  label: "摘要（在列表里显示的简短介绍）", widget: text , required: false }
      - { name: content,  label: "正文内容（支持Markdown格式，右边实时预览效果）", widget: markdown , required: false }
