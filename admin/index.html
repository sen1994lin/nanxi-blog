<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>南曦笔话 · 后台管理</title>
  <!-- 防止英文闪烁：先隐藏工具栏，等翻译完再显示 -->
  <style>
    .cms-toolbar { visibility: hidden; }
    .cms-toolbar.translated { visibility: visible; }
  </style>
</head>
<body>
  <!-- Decap CMS（原 Netlify CMS）编辑器本体，本地托管 -->
  <script src="./vendor/decap-cms.js"></script>

  <!-- 全中文化补丁：覆盖 Decap CMS 内置未翻译的英文界面文字 -->
  <script>
  (function(){
    var MAP = {
      /* ====== 工具栏 / 顶部 ====== */
      'Writing in':              '正在编辑',
      'collection':              '',
      'Publish':                 '发布',
      'Publish button':          '点击发布文章',
      'UNSAVED CHANGES':         '⚠️ 有修改未保存！',

      /* ====== 侧边栏 ====== */
      'Collections':             '内容管理',
      'Search':                  '搜索…',
      'New':                     '新增',

      /* ====== 编辑器 ====== */
      'Delete':                  '删除',
      'Delete entry':            '确认删除这条内容？',
      'Deleted':                 '已删除',
      'Cancel':                  '取消',
      'Save':                    '保存',
      'Saved':                   '✅ 已保存',
      'Saving':                  '保存中…',
      'Draft':                   '草稿',
      'Published':               '已发布',
      'Publishing':              '发布中…',
      'Publish and exit editor': '发布并退出编辑',
      'Delete this entry?':      '确定要删除这条内容吗？此操作无法撤销。',
      'This change has not been saved': '当前修改尚未保存，离开将丢失数据。',

      /* ====== 列表 ====== */
      'No entries found':        '暂无内容，点「新增」来创建第一条吧～',
      'of':                      '/',
      'entries':                 '条',
      'entry':                   '条',
      'Filter':                  '筛选',
      'Sort by':                 '排序方式',
      'Search entries':          '搜索内容…',

      /* ====== 媒体库 ====== */
      'Media':                   '媒体库',
      'Upload a new file':       '上传文件',
      'Upload new':              '上传新文件',
      'Drop files here':         '拖拽文件到此处上传',
      'or':                      '或',
      'click here':              '点这里选择文件',
      'Insert image':            '插入图片',
      'Insert':                  '插入',
      'Close':                   '关闭',
      'File name':               '文件名',
      'Size':                    '大小',
      'Type':                    '类型',
      'URL':                     '地址',

      /* ====== 登录 ====== */
      'Login':                   '登录',
      'Logging in':              '登录中…',
      'Logout':                  '登出',
      'Email':                   '邮箱地址',
      'Password':                '密码',
      'Log in':                  '登录',
      'Log out':                 '登出',
      'Forgot password':         '忘记密码？',

      /* ====== 通用 ====== */
      'Loading':                 '加载中…',
      'Error':                   '错误',
      'An error occurred':       '出错了',
      'Please try again later':  '请稍后再试',
      'Back':                    '返回',
      'Next':                    '下一步',
      'Previous':                '上一步',
      'Done':                    '完成',
      'Edit':                    '编辑',
      'View':                    '查看',
      'Settings':                '设置',
      'Name':                    '名称',
      'Title':                   '标题',
      'Description':             '描述',
      'Date':                    '日期',
      'Author':                  '作者',
      'Slug':                    '链接别名',
      'Path':                    '路径',
      'Body':                    '正文',
      'Content':                 '内容',
      'Field':                   '字段',
      'Value':                   '值',
      'Add':                     '添加',
      'Remove':                  '移除',
      'Move up':                 '上移',
      'Move down':               '下移',
      'No results':              '没有找到结果',
      'Are you sure you want':   '确定要',
      'Confirm':                 '确认',
      'OK':                      '确定',
      'Yes':                     '是',
      'No':                      '否',
      'None':                    '无',
      'All':                     '全部',
      'Default':                 '默认',
      'Custom':                  '自定义',
      'More actions':            '更多操作',
      'Copy URL':                '复制链接',
      'Copied!':                 '已复制！',
      'Open in new tab':         '新窗口打开',
    };

    function translateNode(node) {
      if (!node || !node.textContent) return;
      var text = node.textContent.trim();
      if (MAP[text] !== undefined && MAP[text] !== '') {
        node.textContent = MAP[text];
      }
    }

    function walk(root) {
      var walker = document.createTreeWalker(
        root,
        NodeFilter.SHOW_TEXT | NodeFilter.SHOW_ELEMENT,
        null, false
      );
      while (walker.nextNode()) {
        if (walker.currentNode.nodeType === 3) {
          var t = walker.currentNode.textContent.trim();
          if (MAP[t] !== undefined && MAP[t] !== '') {
            walker.currentNode.textContent = MAP[t];
          }
        } else if (walker.currentNode.nodeType === 1) {
          translateNode(walker.currentNode);
        }
      }
    }

    function translateAll() {
      walk(document.body);
      // 标记工具栏已翻译（解除隐藏）
      var tb = document.querySelector('.cms-toolbar');
      if (tb) tb.classList.add('translated');
    }

    // 等待 CMS 加载完成后翻译，并持续监听动态变化
    function init() {
      translateAll();
      // 监听 SPA 路由变化和动态渲染
      var observer = new MutationObserver(function(mutations) {
        translateAll();
      });
      observer.observe(document.body || document.documentElement, { childList: true, subtree: true, characterData: true });

      // 定时兜底：每2秒扫一遍，防止漏网
      setInterval(translateAll, 2000);
    }

    // 多种触发时机确保覆盖
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
    window.addEventListener('load', function() { setTimeout(translateAll, 500); });
  })();
  </script>
</body>
</html>
