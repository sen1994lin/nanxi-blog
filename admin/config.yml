backend:
  name: git-gateway
  branch: main
media_folder: "images"
public_folder: "images"
locale: zh
publish_mode: simple

collections:
  - name: "site"
    label: "站点设置"
    files:
      - name: "config"
        label: "站点配置"
        file: "config.json"
        fields:
          - { name: siteName,  label: "网站名称", widget: string }
          - { name: logoText, label: "左上角图标(字/emoji)", widget: string }
          - { name: authorName,label: "作者名", widget: string }
          - { name: tagline,  label: "首页一句话简介", widget: string }
          - name: about
            label: "关于页段落(可多段)"
            widget: list
            field: { name: para, label: "段落", widget: text }
          - name: socials
            label: "联系方式"
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "名称", widget: string }
              - { name: url,   label: "链接", widget: string }
          - name: media
            label: "其他自媒体平台"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "平台名", widget: string }
              - { name: icon, label: "图标emoji", widget: string }
              - { name: url,  label: "跳转链接", widget: string }
              - { name: desc, label: "说明", widget: string }
          - name: photos
            label: "相册"
            widget: list
            summary: "{{fields.caption}}"
            fields:
              - { name: src,     label: "图片地址(留空则用emoji)", widget: string }
              - { name: emoji,    label: "占位emoji", widget: string }
              - { name: caption,  label: "说明", widget: string }
          - name: waline
            label: "评论设置(Waline)"
            widget: object
            collapsed: true
            fields:
              - { name: serverURL, label: "后端地址(填了才启用)", widget: string }
              - { name: pageview,  label: "显示阅读量", widget: boolean }
          - name: resume
            label: "简历/作品集"
            widget: object
            collapsed: true
            fields:
              - { name: headline, label: "姓名", widget: string }
              - { name: sub,      label: "副标题", widget: string }
              - { name: summary,  label: "一句话简介", widget: text }
              - name: skills
                label: "技能分组"
                widget: list
                fields:
                  - { name: group, label: "分组名", widget: string }
                  - name: tags
                    label: "技能标签"
                    widget: list
                    field: { name: tag, label: "标签", widget: string }
              - name: experience
                label: "工作经历"
                widget: list
                fields:
                  - { name: role,    label: "职位", widget: string }
                  - { name: company, label: "公司", widget: string }
                  - { name: period,  label: "时间", widget: string }
                  - { name: desc,    label: "描述", widget: text }
              - name: education
                label: "教育背景"
                widget: list
                fields:
                  - { name: school, label: "学校", widget: string }
                  - { name: major,  label: "专业", widget: string }
                  - { name: period, label: "时间", widget: string }
              - name: certifications
                label: "证书"
                widget: list
                field: { name: cert, label: "证书名", widget: string }
          - name: links
            label: "友情链接"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name,   label: "站点名", widget: string }
              - { name: url,    label: "链接", widget: string }
              - { name: desc,   label: "说明", widget: string }
              - { name: avatar, label: "图标emoji", widget: string }
          - name: reward
            label: "赞赏设置"
            widget: object
            collapsed: true
            fields:
              - { name: wechat, label: "微信赞赏码图片地址", widget: string }
              - { name: alipay, label: "支付宝赞赏码图片地址", widget: string }
              - { name: note,   label: "提示语", widget: string }
          - name: seo
            label: "SEO/分享"
            widget: object
            collapsed: true
            fields:
              - { name: title,       label: "分享标题", widget: string }
              - { name: description, label: "分享描述", widget: string }
              - { name: image,       label: "分享封面图地址", widget: string }
          - name: menus
            label: "导航菜单(支持多级)"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title,   label: "菜单名称", widget: string }
              - name: type
                label: "点击后去哪"
                widget: select
                options:
                  - { label: "首页", value: "home" }
                  - { label: "技术文章", value: "tech" }
                  - { label: "生活随笔", value: "life" }
                  - { label: "随想感悟", value: "mind" }
                  - { label: "相册", value: "gallery" }
                  - { label: "留言墙", value: "board" }
                  - { label: "我的简历", value: "resume" }
                  - { label: "友情链接", value: "links" }
                  - { label: "关于我", value: "about" }
                  - { label: "打开某篇文章", value: "post" }
                  - { label: "自定义网址(新窗口打开)", value: "url" }
                  - { label: "发邮件给我", value: "mailto" }
              - { name: target, label: "目标值(按需填写)", widget: string, hint: "选了「打开某篇文章」→填文章ID数字；选了「自定义网址」→填 https://... ；选了「发邮件」→填邮箱地址；其他选项留空即可" }
              - name: children
                label: "二级菜单(留空则不显示)"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title,   label: "菜单名称", widget: string }
                  - name: type
                    label: "点击后去哪"
                    widget: select
                    options:
                      - { label: "首页", value: "home" }
                      - { label: "技术文章", value: "tech" }
                      - { label: "生活随笔", value: "life" }
                      - { label: "随想感悟", value: "mind" }
                      - { label: "相册", value: "gallery" }
                      - { label: "留言墙", value: "board" }
                      - { label: "我的简历", value: "resume" }
                      - { label: "友情链接", value: "links" }
                      - { label: "关于我", value: "about" }
                      - { label: "打开某篇文章", value: "post" }
                      - { label: "自定义网址(新窗口打开)", value: "url" }
                      - { label: "发邮件给我", value: "mailto" }
                  - { name: target, label: "目标值(按需填写)", widget: string, hint: "选了「打开某篇文章」→填文章ID数字；选了「自定义网址」→填 https://... ；选了「发邮件」→填邮箱地址；其他选项留空" }
                  - name: children
                    label: "三级菜单(留空则不显示)"
                    widget: list
                    summary: "{{fields.title}}"
                    fields:
                      - { name: title,   label: "菜单名称", widget: string }
                      - name: type
                        label: "点击后去哪"
                        widget: select
                        options:
                          - { label: "首页", value: "home" }
                          - { label: "技术文章", value: "tech" }
                          - { label: "生活随笔", value: "life" }
                          - { label: "随想感悟", value: "mind" }
                          - { label: "相册", value: "gallery" }
                          - { label: "留言墙", value: "board" }
                          - { label: "我的简历", value: "resume" }
                          - { label: "友情链接", value: "links" }
                          - { label: "关于我", value: "about" }
                          - { label: "打开某篇文章", value: "post" }
                          - { label: "自定义网址(新窗口打开)", value: "url" }
                          - { label: "发邮件给我", value: "mailto" }
                      - { name: target, label: "目标值(按需填写)", widget: string, hint: "选了「打开某篇文章」→填文章ID数字；选了「自定义网址」→填 https://... ；选了「发邮件」→填邮箱地址；其他选项留空" }
                      - name: children
                        label: "四级菜单(留空则不显示)"
                        widget: list
                        summary: "{{fields.title}}"
                        fields:
                          - { name: title,   label: "菜单名称", widget: string }
                          - name: type
                            label: "点击后去哪"
                            widget: select
                            options:
                              - { label: "首页", value: "home" }
                              - { label: "技术文章", value: "tech" }
                              - { label: "生活随笔", value: "life" }
                              - { label: "随想感悟", value: "mind" }
                              - { label: "相册", value: "gallery" }
                              - { label: "留言墙", value: "board" }
                              - { label: "我的简历", value: "resume" }
                              - { label: "友情链接", value: "links" }
                              - { label: "关于我", value: "about" }
                              - { label: "打开某篇文章", value: "post" }
                              - { label: "自定义网址(新窗口打开)", value: "url" }
                              - { label: "发邮件给我", value: "mailto" }
                          - { name: target, label: "目标值(按需填写)", widget: string, hint: "选了「打开某篇文章」→填文章ID数字；选了「自定义网址」→填 https://... ；选了「发邮件」→填邮箱地址；其他选项留空" }

  - name: "posts"
    label: "文章管理"
    label_singular: "文章"
    folder: "posts"
    create: true
    slug: "{{fields.id}}"
    summary: "【{{fields.cat}}】{{fields.title}}"
    description: "点右上角「新增文章」即可发布；点列表里的任意一行可编辑，行末的 ⋯ 可删除。"
    editor:
      preview: true
    sortable_fields: [date, title, cat]
    view_filters:
      - { label: "全部", field: "cat", pattern: ".*" }
      - { label: "技术", field: "cat", pattern: "tech" }
      - { label: "生活", field: "cat", pattern: "life" }
      - { label: "随想", field: "cat", pattern: "mind" }
    fields:
      - { name: id,      label: "文章ID(数字,唯一,新增时自填)", widget: number }
      - { name: title,   label: "标题", widget: string }
      - { name: cat,     label: "分类", widget: select, options: [tech, life, mind], default: "tech" }
      - { name: date,    label: "日期", widget: datetime }
      - name: tags
        label: "标签"
        widget: list
        summary: "{{fields.tag}}"
        field: { name: tag, label: "标签", widget: string }
      - { name: excerpt, label: "摘要", widget: text }
      - { name: content, label: "正文(Markdown,右侧实时预览)", widget: markdown }
